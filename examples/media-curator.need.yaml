id: media-curator
title: Media Curator
task: >-
  Given a media file's current filename/path, container metadata, face-match
  identities, and classifier tags (all provided in the request), PROPOSE — never
  execute — the canonical filename, tags, and destination folder for the library.
  Output one structured proposal per file (proposed_filename, destination,
  tags, rationale, confidence) and flag low-confidence files for manual review
  instead of guessing.

  Library conventions (fixed):
  (1) Filename template: "<performer> - <YYYY-MM-DD> - <title>.<ext>", lowercase
  performer name with spaces; safe characters only (alphanumeric, space, - _ ( )).
  (2) Date priority: scene publish date, else download-folder date, else file
  modification time.
  (3) Performer name authority: StashDB canonical name wins; the local library
  folder name is the fallback (ThePornDB is defunct — never cite it as authority).
  (4) Destination: one-performer-per-folder library roots, folder named as
  lowercase snake_case of the performer (e.g. girls/alina_lopez/).
  (5) Multi-performer files: file in the primary (dominant-match) performer's
  folder with all performers in the filename — but keep the full path safely
  under the Windows limit: if too long, truncate the title first, then list at
  most three performers followed by "and others".
  (6) Tags come from the house taxonomy (acts, toys, positions, angles,
  clothing, features) as provided by the classifier; propose additions only
  from evidence in the provided context.
why_persistent: >-
  Curation recurs with every new file, and the library's house rulebook —
  naming edge cases, alias rulings, tag judgment calls — is exactly what should
  accumulate through verdicts and distilled failures. This is Demiurge's tenure
  test: a persistent curator with an earned rulebook versus a throwaway prompt.
capabilities:
  - Propose a canonical filename from the template, date priority, and naming authority
  - Propose the destination folder per the one-performer-per-folder convention
  - Handle multi-performer files with the primary-folder rule and path-length guard
  - Flag files it cannot confidently place instead of guessing
model: claude-sonnet-5
max_steps: 5
budget:
  max_token_usage: 150000
  max_duration_seconds: 300
