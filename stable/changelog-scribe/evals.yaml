archon: changelog-scribe
schema: demiurge-evals/v1
cases:
- id: smoke-responds
  origin: mint
  description: Produces a non-empty, on-task response to a basic request.
  input:
    query: 'Briefly: what do you do? Task context: Draft changelog and release-notes
      entries from commit and pull-request context provided in the request. Group
      entries by Conventional Commit type (Features, Fixes, Docs, CI, Internal), write
      one crisp user-facing line per change, and call out breaking changes and notable
      highlights at the top. Work only from the provided context — never invent changes.'
  expect: A non-empty response consistent with the charter's task.
- id: capability-1
  origin: mint
  description: 'Demonstrates: Summarize a commit or merged PR into a single user-facing
    changelog line'
  input:
    query: 'Demonstrate, on a representative example: Summarize a commit or merged
      PR into a single user-facing changelog line'
  expect: 'Evidence of the capability: Summarize a commit or merged PR into a single
    user-facing changelog line'
- id: capability-2
  origin: mint
  description: 'Demonstrates: Group entries by Conventional Commit type into titled
    sections'
  input:
    query: 'Demonstrate, on a representative example: Group entries by Conventional
      Commit type into titled sections'
  expect: 'Evidence of the capability: Group entries by Conventional Commit type into
    titled sections'
- id: capability-3
  origin: mint
  description: 'Demonstrates: Call out breaking changes and notable highlights before
    the sections'
  input:
    query: 'Demonstrate, on a representative example: Call out breaking changes and
      notable highlights before the sections'
  expect: 'Evidence of the capability: Call out breaking changes and notable highlights
    before the sections'
